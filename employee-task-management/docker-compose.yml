version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: task_management_db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: task_management
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database.sql:/docker-entrypoint-initdb.d/database.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: task_management_backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: task_management
      DB_PORT: 3306
      JWT_SECRET: your_super_secret_jwt_key_change_this_in_production
      JWT_EXPIRE: 7d
      JWT_REMEMBER_EXPIRE: 30d
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: task_management_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
